# ============================================================
# 东软智慧云脑诊疗平台 - 主配置文件
# ============================================================
# 环境切换说明：
#   master  → 本地开发(自己电脑跑Docker，MySQL/Redis用localhost)
#   others  → 远程开发(连团队共享服务器，MySQL/Redis用IP+端口)
#
# 使用方式：
#   1. 自己搭环境：spring.profiles.active: master
#   2. 连别人的：   spring.profiles.active: others
# ============================================================

spring:
  profiles:
    active: master

server:
  port: 8080

# ---------- MyBatis-Plus 公共配置 ----------
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delmark
      logic-delete-value: 0
      logic-not-delete-value: 1

# ---------- Knife4j 公共配置 ----------
knife4j:
  enable: true
  setting:
    language: zh_cn

# ---------- 业务配置 ----------
hospital:
  jwt:
    # HS256 要求至少 32 字节，生产环境务必通过环境变量 HOSPITAL_JWT_SECRET 覆盖
    secret: "dev-only-secret-please-change-in-prod-32bytes-min!"
    expire-hours: 8
  login:
    max-fail: 5
    lock-minutes: 15
  ai:
    # Python FastAPI 推理服务地址（开发期本地 Windows 原生跑，端口 8000）
    base-url: http://localhost:8000
    # 与 ai-service 的 INTERNAL_KEY 必须一致，否则 Python 中间件返回 401
    # 通过环境变量 INTERNAL_KEY 注入（与 Python 侧同名，设一次两边生效）
    internal-key: ${INTERNAL_KEY:change-me-shared-with-springboot}
    triage-path: /ai/triage
    prescription-check-path: /ai/prescription-check
    medical-record-path: /ai/medical-record
    timeout-seconds: 30
