# ======================== 数据卷 ============================
volumes:
  mysql-data:
    name: hospital-mysql-data
  redis-data:
    name: hospital-redis-data
  rabbitmq-data:
    name: hospital-rabbitmq-data

# ======================== 网络 ========================
networks:
  hospital-net:
    name: hospital-net
    driver: bridge
