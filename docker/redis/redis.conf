# ============================================================
# Redis 配置 - 东软智慧云脑诊疗平台
# ============================================================

# 绑定地址 (容器内允许所有连接，端口映射由 Docker 控制)
bind 0.0.0.0

# 端口
port 6379

# 密码 (与 application-master.yml 中保持一致)
requirepass hospital2024

# 持久化 - RDB
save 900 1
save 300 10
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# 数据目录
dir /data

# 持久化 - AOF (更安全，每次写操作都记录)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 内存限制 (根据实际调整)
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志级别
loglevel notice

# 客户端最大连接数
maxclients 1000

# 超时 (0=不超时)
# 注意：不要设置非零 timeout，否则 Redis 会主动断开空闲客户端，
# Spring Boot Lettuce 连接池可能持有已断开的连接，导致 Connection reset
timeout 0

# TCP keepalive
tcp-keepalive 60
